<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEON PONG</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0a0f;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      font-family: 'Orbitron', monospace, sans-serif;
    }

    #gameContainer {
      position: relative;
    }

    canvas {
      display: block;
      border: 2px solid #ff00ff;
      box-shadow:
        0 0 10px #ff00ff,
        0 0 30px #ff00ff44,
        inset 0 0 30px #ff00ff11;
      border-radius: 4px;
    }

    #overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      pointer-events: none;
    }

    #overlay.active {
      pointer-events: all;
      background: rgba(5, 5, 15, 0.85);
    }

    #overlay h1 {
      font-size: 48px;
      font-weight: 900;
      color: #00ffff;
      text-shadow:
        0 0 10px #00ffff,
        0 0 30px #00ffff88,
        0 0 60px #00ffff44;
      letter-spacing: 12px;
      margin-bottom: 20px;
    }

    #overlay .subtitle {
      font-size: 14px;
      color: #ff00ff;
      text-shadow: 0 0 8px #ff00ff;
      letter-spacing: 4px;
      animation: pulse 1.5s ease-in-out infinite;
    }

    #overlay .score-display {
      font-size: 22px;
      color: #ffff00;
      text-shadow: 0 0 10px #ffff00;
      margin-bottom: 16px;
      letter-spacing: 3px;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }
  </style>
</head>
<body>
  <div id="gameContainer">
    <canvas id="gameCanvas"></canvas>
    <div id="overlay" class="active">
      <h1>NEON PONG</h1>
      <div class="subtitle">PRESS SPACE TO START</div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const overlay = document.getElementById('overlay');

    // --- Canvas size ---
    const W = 600;
    const H = 750;
    canvas.width = W;
    canvas.height = H;

    // --- Colors ---
    const CYAN = '#00ffff';
    const MAGENTA = '#ff00ff';
    const YELLOW = '#ffff00';
    const BG = '#0a0a0f';

    // --- Game state ---
    let state = 'start'; // start | playing | gameover
    let score = 0;
    let highScore = parseInt(localStorage.getItem('neonPongHigh') || '0');

    // --- Paddle ---
    const paddle = {
      w: 110,
      h: 14,
      x: W / 2 - 55,
      y: H - 50,
      speed: 7,
      dx: 0,
    };

    // --- Ball ---
    const ball = {
      x: W / 2,
      y: H / 2,
      r: 8,
      speed: 5,
      dx: 4,
      dy: 4,
    };

    // --- Trail effect ---
    const trail = [];
    const MAX_TRAIL = 12;

    // --- Particles ---
    const particles = [];

    function spawnParticles(x, y, color, count) {
      for (let i = 0; i < count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 3 + 1;
        particles.push({
          x, y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          life: 1,
          decay: Math.random() * 0.03 + 0.02,
          color,
          size: Math.random() * 3 + 1,
        });
      }
    }

    // --- Reset ---
    function resetBall() {
      ball.x = W / 2;
      ball.y = H / 2;
      const angle = (Math.random() * Math.PI / 3) + Math.PI / 6; // 30-90 deg downward
      const spd = 5 + score * 0.15;
      ball.dx = (Math.random() < 0.5 ? 1 : -1) * Math.cos(angle) * spd;
      ball.dy = Math.sin(angle) * spd;
      trail.length = 0;
    }

    function startGame() {
      score = 0;
      paddle.x = W / 2 - paddle.w / 2;
      resetBall();
      state = 'playing';
      overlay.classList.remove('active');
    }

    function gameOver() {
      state = 'gameover';
      if (score > highScore) {
        highScore = score;
        localStorage.setItem('neonPongHigh', highScore);
      }
      overlay.innerHTML = `
        <div class="score-display">SCORE: ${score}</div>
        <h1>${score > highScore - 1 ? 'NEW HIGH' : 'GAME OVER'}</h1>
        <div class="score-display">BEST: ${highScore}</div>
        <div class="subtitle">PRESS SPACE TO RETRY</div>
      `;
      overlay.classList.add('active');
    }

    // --- Input ---
    const keys = {};
    let mouseX = null;

    document.addEventListener('keydown', (e) => {
      keys[e.code] = true;
      if (e.code === 'Space') {
        e.preventDefault();
        if (state !== 'playing') startGame();
      }
    });

    document.addEventListener('keyup', (e) => {
      keys[e.code] = false;
    });

    canvas.addEventListener('mousemove', (e) => {
      const rect = canvas.getBoundingClientRect();
      mouseX = (e.clientX - rect.left) * (W / rect.width);
    });

    canvas.addEventListener('mouseleave', () => {
      mouseX = null;
    });

    canvas.addEventListener('click', () => {
      if (state !== 'playing') startGame();
    });

    // --- Update ---
    function update() {
      if (state !== 'playing') return;

      // Paddle movement
      if (mouseX !== null) {
        paddle.x = mouseX - paddle.w / 2;
      } else {
        if (keys['ArrowLeft'] || keys['KeyA']) paddle.x -= paddle.speed;
        if (keys['ArrowRight'] || keys['KeyD']) paddle.x += paddle.speed;
      }
      paddle.x = Math.max(0, Math.min(W - paddle.w, paddle.x));

      // Ball trail
      trail.push({ x: ball.x, y: ball.y });
      if (trail.length > MAX_TRAIL) trail.shift();

      // Ball movement
      ball.x += ball.dx;
      ball.y += ball.dy;

      // Wall collisions (sides)
      if (ball.x - ball.r <= 0) {
        ball.x = ball.r;
        ball.dx *= -1;
        spawnParticles(ball.x, ball.y, MAGENTA, 6);
      }
      if (ball.x + ball.r >= W) {
        ball.x = W - ball.r;
        ball.dx *= -1;
        spawnParticles(ball.x, ball.y, MAGENTA, 6);
      }

      // Top wall
      if (ball.y - ball.r <= 0) {
        ball.y = ball.r;
        ball.dy *= -1;
        spawnParticles(ball.x, ball.y, CYAN, 6);
      }

      // Paddle collision
      if (
        ball.dy > 0 &&
        ball.y + ball.r >= paddle.y &&
        ball.y + ball.r <= paddle.y + paddle.h + ball.dy &&
        ball.x >= paddle.x - ball.r &&
        ball.x <= paddle.x + paddle.w + ball.r
      ) {
        // Where on paddle did it hit? -1 to 1
        const hit = (ball.x - (paddle.x + paddle.w / 2)) / (paddle.w / 2);
        const angle = hit * (Math.PI / 3); // max 60 deg deflection
        const speed = Math.sqrt(ball.dx * ball.dx + ball.dy * ball.dy) + 0.1;

        ball.dx = Math.sin(angle) * speed;
        ball.dy = -Math.cos(angle) * speed;
        ball.y = paddle.y - ball.r;

        score++;
        spawnParticles(ball.x, ball.y, YELLOW, 12);
      }

      // Ball out of bounds (bottom)
      if (ball.y - ball.r > H) {
        gameOver();
      }

      // Particles
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.life -= p.decay;
        if (p.life <= 0) particles.splice(i, 1);
      }
    }

    // --- Draw helpers ---
    function drawGlow(drawFn, color, blur) {
      ctx.save();
      ctx.shadowColor = color;
      ctx.shadowBlur = blur;
      drawFn();
      ctx.restore();
    }

    // --- Render ---
    function draw() {
      // Background with subtle fade (for motion blur)
      ctx.fillStyle = BG;
      ctx.fillRect(0, 0, W, H);

      // Grid lines (subtle)
      ctx.strokeStyle = '#ffffff08';
      ctx.lineWidth = 1;
      for (let x = 0; x < W; x += 40) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, H);
        ctx.stroke();
      }
      for (let y = 0; y < H; y += 40) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(W, y);
        ctx.stroke();
      }

      if (state !== 'playing' && state !== 'gameover') return;

      // Ball trail
      for (let i = 0; i < trail.length; i++) {
        const t = trail[i];
        const alpha = (i / trail.length) * 0.5;
        const size = ball.r * (i / trail.length);
        ctx.beginPath();
        ctx.arc(t.x, t.y, size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(0, 255, 255, ${alpha})`;
        ctx.fill();
      }

      // Ball
      drawGlow(() => {
        ctx.beginPath();
        ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
        ctx.fillStyle = CYAN;
        ctx.fill();
      }, CYAN, 20);

      // Paddle
      drawGlow(() => {
        const grad = ctx.createLinearGradient(paddle.x, 0, paddle.x + paddle.w, 0);
        grad.addColorStop(0, MAGENTA);
        grad.addColorStop(0.5, '#ff66ff');
        grad.addColorStop(1, MAGENTA);
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.roundRect(paddle.x, paddle.y, paddle.w, paddle.h, 4);
        ctx.fill();
      }, MAGENTA, 18);

      // Particles
      for (const p of particles) {
        ctx.globalAlpha = p.life;
        ctx.fillStyle = p.color;
        ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
      }
      ctx.globalAlpha = 1;

      // Score HUD
      ctx.save();
      ctx.font = '700 28px Orbitron, monospace';
      ctx.fillStyle = YELLOW;
      ctx.shadowColor = YELLOW;
      ctx.shadowBlur = 12;
      ctx.textAlign = 'center';
      ctx.fillText(score, W / 2, 45);

      // High score
      ctx.font = '400 12px Orbitron, monospace';
      ctx.fillStyle = '#ffffff55';
      ctx.shadowBlur = 0;
      ctx.fillText(`BEST: ${highScore}`, W / 2, 68);
      ctx.restore();
    }

    // --- Loop ---
    function loop() {
      update();
      draw();
      requestAnimationFrame(loop);
    }

    loop();
  </script>
</body>
</html>

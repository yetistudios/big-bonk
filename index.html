<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>BONK!</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0a0f;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      font-family: 'Orbitron', monospace, sans-serif;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
      padding-bottom: env(safe-area-inset-bottom, 0px);
    }

    #gameContainer {
      position: relative;
    }

    canvas {
      display: block;
      border: 2px solid #ff00ff;
      box-shadow:
        0 0 10px #ff00ff,
        0 0 30px #ff00ff44,
        inset 0 0 30px #ff00ff11;
      border-radius: 4px;
    }

    #overlay {
      position: absolute;
      z-index: 10;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    #overlay.active {
      pointer-events: all;
      background: rgba(5, 5, 15, 0.55);
      opacity: 1;
    }

    #overlay h1 {
      font-size: 72px;
      font-weight: 900;
      color: #ffe566;
      text-shadow:
        0 0 10px #ff6600,
        0 0 30px #ff660088,
        0 0 60px #ff440066,
        0 0 100px #ff220044,
        0 0 140px #ff000022,
        3px 3px 0 #cc4400;
      letter-spacing: 8px;
      margin-bottom: 20px;
      animation: titleFade 6s ease-in-out infinite;
    }

    #overlay .subtitle {
      font-size: 14px;
      color: #ff00ff;
      text-shadow: 0 0 8px #ff00ff;
      letter-spacing: 4px;
      animation: pulse 1.5s ease-in-out infinite;
    }

    #overlay .score-display {
      font-size: 22px;
      color: #ffff00;
      text-shadow: 0 0 10px #ffff00;
      margin-bottom: 16px;
      letter-spacing: 3px;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }

    @keyframes titleFade {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }
  </style>
</head>
<body>
  <div id="gameContainer">
    <canvas id="gameCanvas"></canvas>
    <div id="overlay" class="active">
      <div class="subtitle">PRESS SPACE TO START</div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const overlay = document.getElementById('overlay');

    // --- Touch detection ---
    const isTouchDevice = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;

    // --- Canvas size (taller on mobile for fullscreen feel) ---
    const W = 600;
    let H = 750;
    const BOTTOM_BUFFER = 64;
    if (isTouchDevice) {
      const usableHeight = window.innerHeight - BOTTOM_BUFFER;
      const screenRatio = usableHeight / window.innerWidth;
      H = Math.round(W * screenRatio);
      H = Math.max(750, Math.min(H, 1200));
    }
    canvas.width = W;
    canvas.height = H;

    // Scale factor for mobile (larger canvas = bigger elements + faster speeds)
    const hScale = H / 750;

    // --- Colors ---
    const CYAN = '#00ffff';
    const MAGENTA = '#ff00ff';
    const YELLOW = '#ffff00';
    const BG = '#0a0a0f';

    // --- Power-up types ---
    const POWERUP_TYPES = {
      wide:    { label: 'W', color: '#00ff88', duration: 15000, weight: 3 },
      multi:   { label: 'M', color: '#ff8800', duration: 0,     weight: 2 },
      slow:    { label: 'S', color: '#8888ff', duration: 12000, weight: 2 },
      magnet:  { label: '~', color: '#ffffff', duration: 15000, weight: 1 },
      speedup: { label: '!', color: '#ff0044', duration: 10000, weight: 2 },
      shrink:  { label: 'V', color: '#ff00ff', duration: 10000, weight: 1 },
    };

    // --- Game state ---
    let state = 'start'; // start | playing | gameover
    let score = 0;
    let highScore = parseInt(localStorage.getItem('neonPongHigh') || '0');

    // --- Power-up state ---
    const pickups = [];
    const activeEffects = {};
    let nextPickupTime = 0;
    const PICKUP_INTERVAL_MIN = 10000;
    const PICKUP_INTERVAL_MAX = 20000;
    const DEFAULT_PADDLE_W = Math.round(110 * hScale);

    // --- Obstacle paddles ---
    const OBS_PADDLE_W = Math.round(100 * hScale);
    const OBS_PADDLE_H = Math.round(12 * hScale);
    const OBS_SCORE_THRESHOLD = 50;
    const OBS_SLIDE_DURATION = 1000;  // ms to slide in/out
    const OBS_SPEED_BASE = 2.0 * hScale;
    const OBS_COLOR = '#ff4400';

    function getObsDuration() {
      // 12s at score 50, scaling to 18s at score 100+
      return Math.min(18000, 12000 + (score - OBS_SCORE_THRESHOLD) * 120);
    }

    function getObsRestPeriod() {
      // 35s at score 50, shrinking to 15s minimum at score 150+
      return Math.max(15000, 35000 - (score - OBS_SCORE_THRESHOLD) * 200);
    }

    let obsPaddles = [];
    let obsState = 'idle'; // idle | sliding_in | active | sliding_out
    let obsTimer = 0;
    let obsPhaseStart = 0;

    // --- Paddle ---
    const paddle = {
      w: DEFAULT_PADDLE_W,
      h: Math.round(14 * hScale),
      x: W / 2 - DEFAULT_PADDLE_W / 2,
      y: H - 50,
      speed: 7 * hScale,
      dx: 0,
    };

    // --- Balls (array for multi-ball) ---
    let balls = [];
    const MAX_TRAIL = Math.round(12 * hScale);

    const MIN_SPEED_FACTOR = 0.6;   // below 60% of spawn speed = "too slow"
    const SLOW_GRACE_MS = 2000;      // allow 2s of slow before correcting
    const SPEED_RESTORE_RATE = 0.02; // gradual acceleration per frame

    function createBall(x, y, dx, dy) {
      return { x, y, r: Math.round(8 * hScale), dx, dy, trail: [], slowSince: 0 };
    }

    // --- Particles ---
    const particles = [];

    function spawnParticles(x, y, color, count) {
      for (let i = 0; i < count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 3 + 1;
        particles.push({
          x, y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          life: 1,
          decay: Math.random() * 0.03 + 0.02,
          color,
          size: Math.random() * 3 + 1,
        });
      }
    }

    // --- Reset ---
    function resetBalls() {
      const angle = (Math.random() * Math.PI / 3) + Math.PI / 6;
      const spd = (5 + score * 0.15) * hScale;
      const dx = (Math.random() < 0.5 ? 1 : -1) * Math.cos(angle) * spd;
      const dy = Math.sin(angle) * spd;
      balls = [createBall(W / 2, H / 2, dx, dy)];
    }

    function clearPowerUps() {
      pickups.length = 0;
      for (const key in activeEffects) delete activeEffects[key];
      paddle.w = DEFAULT_PADDLE_W;
    }

    function startGame() {
      score = 0;
      clearPowerUps();
      resetObstacles();
      paddle.x = W / 2 - paddle.w / 2;
      resetBalls();
      nextPickupTime = Date.now() + 5000;
      state = 'playing';
      overlay.classList.remove('active');
    }

    function gameOver() {
      state = 'gameover';
      clearPowerUps();
      resetObstacles();
      if (score > highScore) {
        highScore = score;
        localStorage.setItem('neonPongHigh', highScore);
      }
      const retryHint = isTouchDevice ? 'TAP TO RETRY' : 'PRESS SPACE TO RETRY';
      overlay.innerHTML = `
        <div class="score-display">SCORE: ${score}</div>
        <h1>${score > highScore - 1 ? 'NEW HIGH' : 'GAME OVER'}</h1>
        <div class="score-display">BEST: ${highScore}</div>
        <div class="subtitle">${retryHint}</div>
      `;
      overlay.classList.add('active');
      overlay.style.background = 'rgba(5, 5, 15, 0.85)';
    }

    // --- Power-up spawning ---
    function maybeSpawnPickup() {
      const now = Date.now();
      if (now < nextPickupTime || score < 3) return;

      nextPickupTime = now + PICKUP_INTERVAL_MIN +
        Math.random() * (PICKUP_INTERVAL_MAX - PICKUP_INTERVAL_MIN);

      const types = Object.keys(POWERUP_TYPES);
      const totalWeight = types.reduce((s, t) => s + POWERUP_TYPES[t].weight, 0);
      let roll = Math.random() * totalWeight;
      let chosen = types[0];
      for (const t of types) {
        roll -= POWERUP_TYPES[t].weight;
        if (roll <= 0) { chosen = t; break; }
      }

      if (activeEffects[chosen]) return;

      const angle = (Math.random() * Math.PI / 3) + Math.PI / 12;
      const spd = (1.5 + Math.random() * 1.5) * hScale;
      pickups.push({
        x: 40 + Math.random() * (W - 80),
        y: -40,
        type: chosen,
        vx: (Math.random() < 0.5 ? 1 : -1) * Math.cos(angle) * spd,
        vy: Math.sin(angle) * spd,
        r: Math.round(14 * hScale),
        pulse: 0,
        spawnTime: Date.now(),
        trail: [],
        entered: false,
      });
    }

    // --- Power-up activation ---
    function activatePowerUp(type) {
      const def = POWERUP_TYPES[type];
      const now = Date.now();

      switch (type) {
        case 'wide':
          // Cancel shrink if active
          if (activeEffects.shrink) {
            paddle.w = activeEffects.shrink.originalW;
            delete activeEffects.shrink;
          }
          if (!activeEffects.wide) {
            activeEffects.wide = { expiry: now + def.duration, originalW: paddle.w };
            paddle.w = Math.min(paddle.w * 1.6, W * 0.4);
          } else {
            activeEffects.wide.expiry = now + def.duration;
          }
          paddle.x = Math.max(0, Math.min(W - paddle.w, paddle.x));
          break;

        case 'shrink':
          // Cancel wide if active
          if (activeEffects.wide) {
            paddle.w = activeEffects.wide.originalW;
            delete activeEffects.wide;
          }
          if (!activeEffects.shrink) {
            activeEffects.shrink = { expiry: now + def.duration, originalW: paddle.w };
            paddle.w = Math.max(paddle.w * 0.55, Math.round(40 * hScale));
          } else {
            activeEffects.shrink.expiry = now + def.duration;
          }
          paddle.x = Math.max(0, Math.min(W - paddle.w, paddle.x));
          break;

        case 'slow':
          // Cancel speedup if active
          if (activeEffects.speedup) {
            const f = activeEffects.speedup.factor;
            balls.forEach(b => { b.dx /= f; b.dy /= f; });
            delete activeEffects.speedup;
          }
          if (!activeEffects.slow) {
            activeEffects.slow = { expiry: now + def.duration, factor: 0.5 };
            balls.forEach(b => { b.dx *= 0.5; b.dy *= 0.5; });
          } else {
            activeEffects.slow.expiry = now + def.duration;
          }
          break;

        case 'speedup':
          // Cancel slow if active
          if (activeEffects.slow) {
            const f = activeEffects.slow.factor;
            balls.forEach(b => { b.dx /= f; b.dy /= f; });
            delete activeEffects.slow;
          }
          if (!activeEffects.speedup) {
            activeEffects.speedup = { expiry: now + def.duration, factor: 1.6 };
            balls.forEach(b => { b.dx *= 1.6; b.dy *= 1.6; });
          } else {
            activeEffects.speedup.expiry = now + def.duration;
          }
          break;

        case 'magnet':
          activeEffects.magnet = { expiry: now + def.duration, heldBalls: [] };
          break;

        case 'multi': {
          const newBalls = [];
          balls.forEach(b => {
            for (let j = 0; j < 2; j++) {
              const a = (Math.random() - 0.5) * Math.PI / 2;
              const spd = Math.sqrt(b.dx * b.dx + b.dy * b.dy) || 5;
              newBalls.push(createBall(
                b.x, b.y,
                Math.sin(a) * spd * (j === 0 ? 1 : -1),
                -Math.abs(Math.cos(a) * spd)
              ));
            }
          });
          balls.push(...newBalls);
          break;
        }
      }
    }

    // --- Power-up expiration ---
    function expireEffects() {
      const now = Date.now();

      if (activeEffects.wide && now >= activeEffects.wide.expiry) {
        paddle.w = activeEffects.wide.originalW;
        paddle.x = Math.max(0, Math.min(W - paddle.w, paddle.x));
        delete activeEffects.wide;
      }

      if (activeEffects.shrink && now >= activeEffects.shrink.expiry) {
        paddle.w = activeEffects.shrink.originalW;
        paddle.x = Math.max(0, Math.min(W - paddle.w, paddle.x));
        delete activeEffects.shrink;
      }

      if (activeEffects.slow && now >= activeEffects.slow.expiry) {
        const f = activeEffects.slow.factor;
        balls.forEach(b => { b.dx /= f; b.dy /= f; });
        delete activeEffects.slow;
      }

      if (activeEffects.speedup && now >= activeEffects.speedup.expiry) {
        const f = activeEffects.speedup.factor;
        balls.forEach(b => { b.dx /= f; b.dy /= f; });
        delete activeEffects.speedup;
      }

      if (activeEffects.magnet && now >= activeEffects.magnet.expiry) {
        releaseMagnetBalls();
        delete activeEffects.magnet;
      }
    }

    // --- Magnet release ---
    function releaseMagnetBalls() {
      if (!activeEffects.magnet) return;
      activeEffects.magnet.heldBalls.forEach(hb => {
        const speed = Math.sqrt(hb.savedDx ** 2 + hb.savedDy ** 2) || 5;
        const angle = (Math.random() - 0.5) * Math.PI / 3;
        hb.ball.dx = Math.sin(angle) * speed;
        hb.ball.dy = -Math.abs(Math.cos(angle) * speed);
      });
      activeEffects.magnet.heldBalls = [];
    }

    // --- Obstacle paddle lifecycle ---
    function initObsPaddles() {
      const playTop = 60 * hScale;
      const playBot = paddle.y - 30 * hScale;
      const zone = playBot - playTop;
      const y1 = playTop + zone * (1 / 3);
      const y2 = playTop + zone * (2 / 3);

      obsPaddles = [
        {
          x: -OBS_PADDLE_W,          // starts offscreen left
          y: y1,
          targetX: W * 0.15,         // slides in to 15% from left
          homeX: -OBS_PADDLE_W,
          dir: 1,                     // moves right first
          fromSide: 'left',
        },
        {
          x: W,                       // starts offscreen right
          y: y2,
          targetX: W * 0.85 - OBS_PADDLE_W, // slides in to 85% from left
          homeX: W,
          dir: -1,                    // moves left first
          fromSide: 'right',
        },
      ];
    }

    function resetObstacles() {
      obsPaddles = [];
      obsState = 'idle';
      obsTimer = 0;
      obsPhaseStart = 0;
    }

    function updateObstacles() {
      if (score < OBS_SCORE_THRESHOLD) return;

      const now = Date.now();

      switch (obsState) {
        case 'idle':
          if (obsTimer === 0) {
            // First time reaching threshold — short delay then spawn
            obsTimer = now + 2000;
          }
          if (now >= obsTimer) {
            initObsPaddles();
            obsState = 'sliding_in';
            obsPhaseStart = now;
          }
          break;

        case 'sliding_in': {
          const elapsed = now - obsPhaseStart;
          const t = Math.min(1, elapsed / OBS_SLIDE_DURATION);
          // Ease-out cubic
          const ease = 1 - Math.pow(1 - t, 3);
          obsPaddles.forEach(op => {
            op.x = op.homeX + (op.targetX - op.homeX) * ease;
          });
          if (t >= 1) {
            obsState = 'active';
            obsPhaseStart = now;
          }
          break;
        }

        case 'active': {
          const duration = getObsDuration();
          const elapsed = now - obsPhaseStart;

          // Horizontal oscillation
          obsPaddles.forEach(op => {
            op.x += op.dir * OBS_SPEED_BASE;
            // Bounce off walls
            if (op.x <= 0) {
              op.x = 0;
              op.dir = 1;
            }
            if (op.x + OBS_PADDLE_W >= W) {
              op.x = W - OBS_PADDLE_W;
              op.dir = -1;
            }
          });

          if (elapsed >= duration) {
            obsState = 'sliding_out';
            obsPhaseStart = now;
            // Record current x as the start of slide-out
            obsPaddles.forEach(op => {
              op.slideOutStartX = op.x;
            });
          }
          break;
        }

        case 'sliding_out': {
          const elapsed = now - obsPhaseStart;
          const t = Math.min(1, elapsed / OBS_SLIDE_DURATION);
          // Ease-in cubic
          const ease = t * t * t;
          obsPaddles.forEach(op => {
            op.x = op.slideOutStartX + (op.homeX - op.slideOutStartX) * ease;
          });
          if (t >= 1) {
            obsState = 'idle';
            obsTimer = now + getObsRestPeriod();
            obsPaddles = [];
          }
          break;
        }
      }
    }

    // --- Input ---
    const keys = {};
    let mouseX = null;

    document.addEventListener('keydown', (e) => {
      keys[e.code] = true;
      if (e.code === 'Space') {
        e.preventDefault();
        if (state === 'playing') {
          releaseMagnetBalls();
        } else {
          startGame();
        }
      }
    });

    document.addEventListener('keyup', (e) => {
      keys[e.code] = false;
    });

    canvas.addEventListener('mousemove', (e) => {
      const rect = canvas.getBoundingClientRect();
      mouseX = (e.clientX - rect.left) * (W / rect.width);
    });

    canvas.addEventListener('mouseleave', () => {
      mouseX = null;
    });

    canvas.addEventListener('click', () => {
      if (state === 'playing') {
        releaseMagnetBalls();
      } else {
        startGame();
      }
    });

    // --- Touch input (document-level so touches below canvas still work) ---
    let touchX = null;

    document.addEventListener('touchstart', (e) => {
      e.preventDefault();
      if (state !== 'playing') {
        startGame();
        return;
      }
      releaseMagnetBalls();
      const rect = canvas.getBoundingClientRect();
      touchX = (e.touches[0].clientX - rect.left) * (W / rect.width);
    }, { passive: false });

    document.addEventListener('touchmove', (e) => {
      e.preventDefault();
      const rect = canvas.getBoundingClientRect();
      touchX = (e.touches[0].clientX - rect.left) * (W / rect.width);
    }, { passive: false });

    document.addEventListener('touchend', (e) => {
      e.preventDefault();
      touchX = null;
    }, { passive: false });

    overlay.addEventListener('click', () => {
      if (state !== 'playing') startGame();
    });

    // --- Update ---
    function update() {
      if (state !== 'playing') return;

      expireEffects();
      maybeSpawnPickup();
      updateObstacles();

      // Paddle movement
      if (touchX !== null) {
        paddle.x = touchX - paddle.w / 2;
      } else if (mouseX !== null) {
        paddle.x = mouseX - paddle.w / 2;
      } else {
        if (keys['ArrowLeft'] || keys['KeyA']) paddle.x -= paddle.speed;
        if (keys['ArrowRight'] || keys['KeyD']) paddle.x += paddle.speed;
      }
      paddle.x = Math.max(0, Math.min(W - paddle.w, paddle.x));

      // Update magnet held balls to follow paddle
      if (activeEffects.magnet) {
        activeEffects.magnet.heldBalls.forEach(hb => {
          hb.ball.x = paddle.x + hb.offsetX;
          hb.ball.x = Math.max(hb.ball.r, Math.min(W - hb.ball.r, hb.ball.x));
          hb.ball.y = paddle.y - hb.ball.r;
        });
      }

      // Update pickups (bouncing + collection)
      for (let i = pickups.length - 1; i >= 0; i--) {
        const pk = pickups[i];
        pk.x += pk.vx;
        pk.y += pk.vy;
        pk.pulse += 0.05;

        // Trail
        pk.trail.push({ x: pk.x, y: pk.y });
        if (pk.trail.length > 8) pk.trail.shift();

        // Ambient particles
        if (Math.random() < 0.1) {
          particles.push({
            x: pk.x + (Math.random() - 0.5) * pk.r,
            y: pk.y + (Math.random() - 0.5) * pk.r,
            vx: (Math.random() - 0.5) * 0.5,
            vy: (Math.random() - 0.5) * 0.5,
            life: 1,
            decay: 0.04 + Math.random() * 0.03,
            color: POWERUP_TYPES[pk.type].color,
            size: Math.random() * 2 + 0.5,
          });
        }

        // Mark as entered once fully inside the canvas
        if (!pk.entered && pk.y > pk.r) pk.entered = true;

        // Bounce off walls (skip top until fully entered)
        if (pk.x - pk.r <= 0)  { pk.x = pk.r;     pk.vx *= -1; }
        if (pk.x + pk.r >= W)  { pk.x = W - pk.r;  pk.vx *= -1; }
        if (pk.entered && pk.y - pk.r <= 0) { pk.y = pk.r; pk.vy *= -1; }
        if (pk.y + pk.r >= H)  { pk.y = H - pk.r;  pk.vy *= -1; }

        // Despawn after 20 seconds
        if (Date.now() - pk.spawnTime > 20000) {
          pickups.splice(i, 1);
          continue;
        }

        // Check ball collision
        let collected = false;
        for (const b of balls) {
          const dx = pk.x - b.x;
          const dy = pk.y - b.y;
          if (Math.sqrt(dx * dx + dy * dy) < pk.r + b.r) {
            collected = true;
            break;
          }
        }

        // Check paddle collision
        if (
          !collected &&
          pk.y + pk.r >= paddle.y &&
          pk.y - pk.r <= paddle.y + paddle.h &&
          pk.x + pk.r >= paddle.x &&
          pk.x - pk.r <= paddle.x + paddle.w
        ) {
          collected = true;
        }

        if (collected) {
          activatePowerUp(pk.type);
          spawnParticles(pk.x, pk.y, POWERUP_TYPES[pk.type].color, 20);
          pickups.splice(i, 1);
        }
      }

      // Update balls
      for (let bi = balls.length - 1; bi >= 0; bi--) {
        const b = balls[bi];

        // Trail
        b.trail.push({ x: b.x, y: b.y });
        if (b.trail.length > MAX_TRAIL) b.trail.shift();

        // Skip movement for magnet-held balls
        if (activeEffects.magnet &&
            activeEffects.magnet.heldBalls.some(hb => hb.ball === b)) {
          continue;
        }

        // Movement
        b.x += b.dx;
        b.y += b.dy;

        // Minimum speed enforcement
        const curSpeed = Math.sqrt(b.dx * b.dx + b.dy * b.dy);
        const baseSpeed = (5 + score * 0.15) * hScale;
        const minSpeed = baseSpeed * MIN_SPEED_FACTOR;
        if (curSpeed < minSpeed && !activeEffects.slow) {
          if (b.slowSince === 0) {
            b.slowSince = Date.now();
          } else if (Date.now() - b.slowSince > SLOW_GRACE_MS) {
            const boost = 1 + SPEED_RESTORE_RATE;
            b.dx *= boost;
            b.dy *= boost;
          }
        } else {
          b.slowSince = 0;
        }

        // Wall collisions (sides)
        if (b.x - b.r <= 0) {
          b.x = b.r;
          b.dx *= -1;
          score++;
          spawnParticles(b.x, b.y, MAGENTA, 6);
        }
        if (b.x + b.r >= W) {
          b.x = W - b.r;
          b.dx *= -1;
          score++;
          spawnParticles(b.x, b.y, MAGENTA, 6);
        }

        // Top wall
        if (b.y - b.r <= 0) {
          b.y = b.r;
          b.dy *= -1;
          score++;
          spawnParticles(b.x, b.y, CYAN, 6);
        }

        // Paddle collision
        if (
          b.dy > 0 &&
          b.y + b.r >= paddle.y &&
          b.y + b.r <= paddle.y + paddle.h + Math.abs(b.dy) &&
          b.x >= paddle.x - b.r &&
          b.x <= paddle.x + paddle.w + b.r
        ) {
          if (activeEffects.magnet) {
            const offsetX = b.x - paddle.x;
            const savedDx = b.dx;
            const savedDy = b.dy;
            b.dx = 0;
            b.dy = 0;
            b.y = paddle.y - b.r;
            activeEffects.magnet.heldBalls.push({ ball: b, offsetX, savedDx, savedDy });
          } else {
            const hit = (b.x - (paddle.x + paddle.w / 2)) / (paddle.w / 2);
            const angle = hit * (Math.PI / 3);
            const speed = Math.sqrt(b.dx * b.dx + b.dy * b.dy) + 0.1;
            b.dx = Math.sin(angle) * speed;
            b.dy = -Math.cos(angle) * speed;
            b.y = paddle.y - b.r;
          }
          score++;
          spawnParticles(b.x, b.y, YELLOW, 12);
        }

        // Obstacle paddle collision
        for (const op of obsPaddles) {
          if (
            b.x + b.r >= op.x &&
            b.x - b.r <= op.x + OBS_PADDLE_W &&
            b.y + b.r >= op.y &&
            b.y - b.r <= op.y + OBS_PADDLE_H
          ) {
            // Determine if ball hit top/bottom or sides
            const overlapLeft = (b.x + b.r) - op.x;
            const overlapRight = (op.x + OBS_PADDLE_W) - (b.x - b.r);
            const overlapTop = (b.y + b.r) - op.y;
            const overlapBottom = (op.y + OBS_PADDLE_H) - (b.y - b.r);
            const minOverlap = Math.min(overlapLeft, overlapRight, overlapTop, overlapBottom);

            if (minOverlap === overlapTop || minOverlap === overlapBottom) {
              b.dy *= -1;
              if (minOverlap === overlapTop) b.y = op.y - b.r;
              else b.y = op.y + OBS_PADDLE_H + b.r;
            } else {
              b.dx *= -1;
              if (minOverlap === overlapLeft) b.x = op.x - b.r;
              else b.x = op.x + OBS_PADDLE_W + b.r;
            }
            score++;
            spawnParticles(b.x, b.y, OBS_COLOR, 8);
            break;
          }
        }

        // Ball out of bounds (bottom)
        if (b.y - b.r > H) {
          balls.splice(bi, 1);
        }
      }

      // Ball-to-ball collisions (elastic, equal mass)
      for (let i = 0; i < balls.length; i++) {
        for (let j = i + 1; j < balls.length; j++) {
          const a = balls[i], b = balls[j];
          const dx = b.x - a.x;
          const dy = b.y - a.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          const minDist = a.r + b.r;
          if (dist > 0 && dist < minDist) {
            // Normal vector
            const nx = dx / dist;
            const ny = dy / dist;
            // Relative velocity along normal
            const dvx = a.dx - b.dx;
            const dvy = a.dy - b.dy;
            const dvn = dvx * nx + dvy * ny;
            // Only resolve if balls are approaching
            if (dvn > 0) {
              // Equal mass elastic: swap normal components
              a.dx -= dvn * nx;
              a.dy -= dvn * ny;
              b.dx += dvn * nx;
              b.dy += dvn * ny;
              // Separate so they don't overlap
              const overlap = (minDist - dist) / 2;
              a.x -= overlap * nx;
              a.y -= overlap * ny;
              b.x += overlap * nx;
              b.y += overlap * ny;
              spawnParticles((a.x + b.x) / 2, (a.y + b.y) / 2, CYAN, 6);
            }
          }
        }
      }

      // Game over when all balls lost
      if (balls.length === 0) {
        gameOver();
      }

      // Particles
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.life -= p.decay;
        if (p.life <= 0) particles.splice(i, 1);
      }
    }

    // --- Draw helpers ---
    function drawGlow(drawFn, color, blur) {
      ctx.save();
      ctx.shadowColor = color;
      ctx.shadowBlur = blur;
      drawFn();
      ctx.restore();
    }

    // --- Pickup shape path ---
    function pickupShapePath(type, x, y, r) {
      ctx.beginPath();
      switch (type) {
        case 'wide': // Hexagon
          for (let i = 0; i < 6; i++) {
            const a = (Math.PI / 3) * i - Math.PI / 6;
            const px = x + r * Math.cos(a), py = y + r * Math.sin(a);
            i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
          }
          ctx.closePath();
          break;
        case 'multi': // 8-pointed starburst
          for (let i = 0; i < 16; i++) {
            const a = (Math.PI / 8) * i - Math.PI / 2;
            const sr = i % 2 === 0 ? r : r * 0.3;
            const px = x + sr * Math.cos(a), py = y + sr * Math.sin(a);
            i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
          }
          ctx.closePath();
          break;
        case 'slow': // Octagon
          for (let i = 0; i < 8; i++) {
            const a = (Math.PI / 4) * i - Math.PI / 8;
            const px = x + r * Math.cos(a), py = y + r * Math.sin(a);
            i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
          }
          ctx.closePath();
          break;
        case 'magnet': // Diamond
          ctx.moveTo(x, y - r);
          ctx.lineTo(x + r, y);
          ctx.lineTo(x, y + r);
          ctx.lineTo(x - r, y);
          ctx.closePath();
          break;
        case 'speedup': // Triangle up
          ctx.moveTo(x, y - r);
          ctx.lineTo(x + r * 0.87, y + r * 0.5);
          ctx.lineTo(x - r * 0.87, y + r * 0.5);
          ctx.closePath();
          break;
        case 'shrink': // Inverted triangle
          ctx.moveTo(x, y + r);
          ctx.lineTo(x + r * 0.87, y - r * 0.5);
          ctx.lineTo(x - r * 0.87, y - r * 0.5);
          ctx.closePath();
          break;
      }
    }

    // --- Pickup icon (drawn in white for contrast) ---
    function drawPickupIcon(type, x, y, r) {
      const s = r * 0.5;
      ctx.strokeStyle = '#ffffff';
      ctx.fillStyle = '#ffffff';
      ctx.lineWidth = 2;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      switch (type) {
        case 'wide': // Outward arrows
          ctx.beginPath();
          ctx.moveTo(x - s * 0.15, y); ctx.lineTo(x - s, y);
          ctx.moveTo(x - s * 0.6, y - s * 0.35); ctx.lineTo(x - s, y); ctx.lineTo(x - s * 0.6, y + s * 0.35);
          ctx.moveTo(x + s * 0.15, y); ctx.lineTo(x + s, y);
          ctx.moveTo(x + s * 0.6, y - s * 0.35); ctx.lineTo(x + s, y); ctx.lineTo(x + s * 0.6, y + s * 0.35);
          ctx.stroke();
          break;
        case 'multi': // Three overlapping balls
          ctx.lineWidth = 1.5;
          for (const [ox, oy] of [[-s * 0.3, s * 0.15], [s * 0.3, s * 0.15], [0, -s * 0.25]]) {
            ctx.beginPath();
            ctx.arc(x + ox, y + oy, s * 0.28, 0, Math.PI * 2);
            ctx.stroke();
          }
          break;
        case 'slow': // Clock face
          ctx.lineWidth = 1.5;
          ctx.beginPath();
          ctx.arc(x, y, s * 0.55, 0, Math.PI * 2);
          ctx.stroke();
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.moveTo(x, y); ctx.lineTo(x, y - s * 0.38);
          ctx.moveTo(x, y); ctx.lineTo(x + s * 0.28, y);
          ctx.stroke();
          break;
        case 'magnet': // U-shape magnet
          ctx.beginPath();
          ctx.arc(x, y + s * 0.1, s * 0.35, 0, Math.PI);
          ctx.moveTo(x - s * 0.35, y + s * 0.1); ctx.lineTo(x - s * 0.35, y - s * 0.4);
          ctx.moveTo(x + s * 0.35, y + s * 0.1); ctx.lineTo(x + s * 0.35, y - s * 0.4);
          ctx.stroke();
          break;
        case 'speedup': // Lightning bolt
          ctx.lineWidth = 2.5;
          ctx.beginPath();
          ctx.moveTo(x + s * 0.2, y - s * 0.55);
          ctx.lineTo(x - s * 0.1, y + s * 0.05);
          ctx.lineTo(x + s * 0.15, y + s * 0.05);
          ctx.lineTo(x - s * 0.2, y + s * 0.55);
          ctx.stroke();
          break;
        case 'shrink': // Futuristic minus bar
          ctx.lineWidth = 2.5;
          ctx.beginPath();
          ctx.moveTo(x - s * 0.55, y); ctx.lineTo(x + s * 0.55, y);
          ctx.stroke();
          // Small end caps
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.moveTo(x - s * 0.55, y - s * 0.2); ctx.lineTo(x - s * 0.55, y + s * 0.2);
          ctx.moveTo(x + s * 0.55, y - s * 0.2); ctx.lineTo(x + s * 0.55, y + s * 0.2);
          ctx.stroke();
          break;
      }
    }

    // --- Draw pickups ---
    function drawPickups() {
      pickups.forEach(pk => {
        const def = POWERUP_TYPES[pk.type];
        const pulseScale = 1 + Math.sin(pk.pulse) * 0.15;
        const r = pk.r * pulseScale;

        // Fade in as pickup enters the screen
        const enterAlpha = Math.min(1, Math.max(0, (pk.y + pk.r) / (pk.r * 4)));
        ctx.save();
        ctx.globalAlpha = enterAlpha;

        // Trail
        for (let i = 0; i < pk.trail.length; i++) {
          const t = pk.trail[i];
          const alpha = (i / pk.trail.length) * 0.4;
          const tr = r * (i / pk.trail.length) * 0.6;
          ctx.beginPath();
          ctx.arc(t.x, t.y, Math.max(tr, 1), 0, Math.PI * 2);
          ctx.fillStyle = def.color + Math.floor(alpha * 255).toString(16).padStart(2, '0');
          ctx.fill();
        }

        // Shape + icon with glow
        drawGlow(() => {
          pickupShapePath(pk.type, pk.x, pk.y, r);
          ctx.strokeStyle = def.color;
          ctx.lineWidth = 2;
          ctx.stroke();
          ctx.fillStyle = def.color + '55';
          ctx.fill();

          drawPickupIcon(pk.type, pk.x, pk.y, r);
        }, def.color, 12 + Math.sin(pk.pulse) * 4);

        ctx.restore();
      });
    }

    // --- Draw active effect timer bars ---
    function drawActiveEffects() {
      const now = Date.now();
      const timedKeys = Object.keys(activeEffects).filter(k =>
        POWERUP_TYPES[k] && POWERUP_TYPES[k].duration > 0
      );
      if (timedKeys.length === 0) return;

      const barW = Math.round(60 * hScale);
      const barH = Math.round(6 * hScale);
      const gap = Math.round(8 * hScale);
      const totalW = timedKeys.length * (barW + gap) - gap;
      let startX = (W - totalW) / 2;
      const y = Math.round(82 * hScale);

      timedKeys.forEach(key => {
        const eff = activeEffects[key];
        const def = POWERUP_TYPES[key];
        const remaining = Math.max(0, eff.expiry - now);
        const fraction = remaining / def.duration;

        ctx.fillStyle = '#ffffff15';
        ctx.fillRect(startX, y, barW, barH);

        drawGlow(() => {
          ctx.fillStyle = def.color;
          ctx.fillRect(startX, y, barW * fraction, barH);
        }, def.color, 6);

        ctx.font = '400 ' + Math.round(9 * hScale) + 'px Orbitron, monospace';
        ctx.fillStyle = def.color;
        ctx.textAlign = 'center';
        ctx.shadowBlur = 0;
        ctx.fillText(def.label, startX + barW / 2, y - Math.round(5 * hScale));

        startX += barW + gap;
      });
    }

    // --- Render ---
    function draw() {
      ctx.fillStyle = BG;
      ctx.fillRect(0, 0, W, H);

      // Grid lines (subtle)
      ctx.strokeStyle = '#ffffff08';
      ctx.lineWidth = 1;
      for (let x = 0; x < W; x += 40) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, H);
        ctx.stroke();
      }
      for (let y = 0; y < H; y += 40) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(W, y);
        ctx.stroke();
      }

      // BONK! title (canvas-drawn)
      if (state !== 'gameover') {
        const t = Date.now() / 3000;
        const bonkAlpha = state === 'playing'
          ? 0.10 + Math.sin(t * Math.PI) * 0.08
          : 0.65 + Math.sin(t * Math.PI) * 0.35;
        ctx.save();
        ctx.globalAlpha = bonkAlpha;
        ctx.font = '900 ' + Math.round(72 * hScale) + 'px Orbitron, monospace';
        ctx.fillStyle = '#ffe566';
        if (state !== 'playing') {
          ctx.shadowColor = '#ff6600';
          ctx.shadowBlur = Math.round(30 * hScale);
        }
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('BONK!', W / 2, H * 0.4);
        ctx.restore();
      }

      if (state !== 'playing' && state !== 'gameover') return;

      // Ball trails
      balls.forEach(b => {
        for (let i = 0; i < b.trail.length; i++) {
          const t = b.trail[i];
          const alpha = (i / b.trail.length) * 0.5;
          const size = b.r * (i / b.trail.length);
          ctx.beginPath();
          ctx.arc(t.x, t.y, size, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(0, 255, 255, ${alpha})`;
          ctx.fill();
        }
      });

      // Balls
      balls.forEach(b => {
        drawGlow(() => {
          ctx.beginPath();
          ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
          ctx.fillStyle = CYAN;
          ctx.fill();
        }, CYAN, 20);
      });

      // Paddle
      drawGlow(() => {
        const grad = ctx.createLinearGradient(paddle.x, 0, paddle.x + paddle.w, 0);
        grad.addColorStop(0, MAGENTA);
        grad.addColorStop(0.5, '#ff66ff');
        grad.addColorStop(1, MAGENTA);
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.roundRect(paddle.x, paddle.y, paddle.w, paddle.h, 4);
        ctx.fill();
      }, MAGENTA, 18);

      // Obstacle paddles
      obsPaddles.forEach(op => {
        drawGlow(() => {
          const grad = ctx.createLinearGradient(op.x, 0, op.x + OBS_PADDLE_W, 0);
          grad.addColorStop(0, OBS_COLOR);
          grad.addColorStop(0.5, '#ff7744');
          grad.addColorStop(1, OBS_COLOR);
          ctx.fillStyle = grad;
          ctx.beginPath();
          ctx.roundRect(op.x, op.y, OBS_PADDLE_W, OBS_PADDLE_H, 3);
          ctx.fill();
        }, OBS_COLOR, 14);

        // Hazard stripes (subtle diagonal lines)
        ctx.save();
        ctx.globalAlpha = 0.25;
        ctx.beginPath();
        ctx.roundRect(op.x, op.y, OBS_PADDLE_W, OBS_PADDLE_H, 3);
        ctx.clip();
        ctx.strokeStyle = '#000000';
        ctx.lineWidth = 2;
        for (let sx = -OBS_PADDLE_H; sx < OBS_PADDLE_W + OBS_PADDLE_H; sx += 8) {
          ctx.beginPath();
          ctx.moveTo(op.x + sx, op.y + OBS_PADDLE_H);
          ctx.lineTo(op.x + sx + OBS_PADDLE_H, op.y);
          ctx.stroke();
        }
        ctx.restore();
      });

      // Pickups
      drawPickups();

      // Particles
      for (const p of particles) {
        ctx.globalAlpha = p.life;
        ctx.fillStyle = p.color;
        ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
      }
      ctx.globalAlpha = 1;

      // Score HUD
      ctx.save();
      ctx.font = '700 ' + Math.round(28 * hScale) + 'px Orbitron, monospace';
      ctx.fillStyle = YELLOW;
      ctx.shadowColor = YELLOW;
      ctx.shadowBlur = 12;
      ctx.textAlign = 'center';
      ctx.fillText(score, W / 2, Math.round(45 * hScale));

      // High score
      ctx.font = '400 ' + Math.round(12 * hScale) + 'px Orbitron, monospace';
      ctx.fillStyle = '#ffffff55';
      ctx.shadowBlur = 0;
      ctx.fillText(`BEST: ${highScore}`, W / 2, Math.round(68 * hScale));
      ctx.restore();

      // Active effect timers
      drawActiveEffects();
    }

    // --- Loop ---
    function loop() {
      update();
      draw();
      requestAnimationFrame(loop);
    }

    // --- Responsive scaling ---
    function resize() {
      const container = document.getElementById('gameContainer');
      const pct = isTouchDevice ? 1.0 : 0.95;
      const maxW = window.innerWidth * pct;
      const maxH = window.innerHeight * pct;
      const scale = Math.min(maxW / W, maxH / H);
      container.style.width = (W * scale) + 'px';
      container.style.height = (H * scale) + 'px';
      canvas.style.width = (W * scale) + 'px';
      canvas.style.height = (H * scale) + 'px';
      if (isTouchDevice && H > 750) {
        document.body.style.alignItems = 'flex-start';
        document.body.style.paddingTop = '8px';
      }
    }

    window.addEventListener('resize', resize);
    resize();

    // --- Touch device UI hint ---
    if (isTouchDevice) {
      const sub = overlay.querySelector('.subtitle');
      if (sub) sub.textContent = 'TAP TO START';
    }

    loop();
  </script>
</body>
</html>
